<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL MISSION MASTER: 10일 완성 실무</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f8fafc; }
        .sql-editor { font-family: 'Consolas', 'Monaco', monospace !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CustomIcon = ({ name, className = "w-5 h-5", color = "currentColor" }) => {
            const icons = {
                database: <path d="M3 5V19C3 20.1 5.24 21 8 21C10.76 21 13 20.1 13 19V5C13 3.9 10.76 3 8 3C5.24 3 3 3.9 3 5M3 5C3 6.1 5.24 7 8 7C10.76 7 13 6.1 13 5M3 12C3 13.1 5.24 14 8 14C10.76 14 13 13.1 13 12M13 19C13 20.1 15.24 21 18 21C20.76 21 23 20.1 23 19V10C23 8.9 20.76 8 18 8C15.24 8 13 8.9 13 10M13 10C13 11.1 15.24 12 18 12C20.76 12 23 11.1 23 10M13 15C13 16.1 15.24 17 18 17C20.76 17 23 16.1 23 15" />,
                check: <polyline points="20 6 9 17 4 12" />,
                lock: <React.Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                award: <React.Fragment><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></React.Fragment>,
                info: <React.Fragment><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></React.Fragment>,
                layout: <React.Fragment><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></React.Fragment>,
                play: <polygon points="5 3 19 12 5 21 5 3" />
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const schemaData = {
            Customers: {
                columns: ["고객ID", "이름", "나이", "지역", "가입일"],
                types: ["TEXT", "TEXT", "INTEGER", "TEXT", "DATE"],
                samples: [
                    ["C-001", "김철수", 32, "서울", "2024-03-01"],
                    ["C-002", "이영희", 28, "경기", "2024-03-05"],
                    ["C-003", "박민수", 54, "서울", "2024-02-20"],
                    ["C-004", "최지우", 35, "서울", "2024-02-15"], 
                    ["C-005", "정다은", 31, "인천", "2024-03-10"]
                ]
            },
            Usage: {
                columns: ["고객ID", "사용일자", "데이터사용량", "매출액"],
                types: ["TEXT", "DATE", "REAL", "INTEGER"],
                samples: [
                    ["C-001", "2024-04-05", 1.2, 3500],
                    ["C-002", "2024-04-05", 0.5, 1200],
                    ["C-004", "2024-04-05", 2.1, 4200],
                    ["C-005", "2024-04-05", 1.5, 2800]
                ]
            },
            Subscriptions: {
                columns: ["고객ID", "요금제ID", "상태"],
                types: ["TEXT", "TEXT", "TEXT"],
                samples: [
                    ["C-001", "P-01", "Active"],
                    ["C-002", "P-02", "Churned"],
                    ["C-004", "P-01", "Active"],
                    ["C-005", "P-02", "Active"]
                ]
            }
        };

        const curriculum = [
            { day: 1, title: "데이터 필터링", tables: ["Customers"], syntax: "SELECT * FROM 테이블 WHERE 조건;", hint: "지역='서울', 나이 30대, 가입일 '2024-03-01' 이후 조건을 AND로 연결하세요.", question: "2024년 3월 1일 이후 가입한 서울 지역의 30대 고객 명단을 추출하세요.", solution: "SELECT * FROM Customers WHERE 1=1 AND 지역 = '서울' AND 나이 BETWEEN 30 AND 39 AND 가입일 >= '2024-03-01';", token: "XN-A1-82" },
            { day: 2, title: "데이터 가공과 정렬", tables: ["Customers"], syntax: "CASE WHEN 조건 THEN 값 ELSE 값 END, ORDER BY 컬럼 DESC;", hint: "30미만 '청년', 50미만 '중년', 나머지는 '장년'입니다.", question: "고객을 연령대별(청년<30, 중년<50, 장년>=50)로 분류하고 나이가 많은 순으로 정렬하세요.", solution: "SELECT 이름, 나이, CASE WHEN 나이 < 30 THEN '청년' WHEN 나이 < 50 THEN '중년' ELSE '장년' END as 연령그룹 FROM Customers ORDER BY 나이 DESC;", token: "XN-B2-19" },
            { day: 3, title: "통계 요약 (JOIN)", tables: ["Customers", "Usage"], syntax: "JOIN 테이블 ON 조건, GROUP BY 컬럼, COUNT(), SUM();", hint: "고객ID로 연결하고 지역별로 묶으세요.", question: "지역별 고객 수와 해당 지역의 총 매출액 합계를 계산하세요.", solution: "SELECT C.지역, COUNT(DISTINCT C.고객ID) as 고객수, SUM(U.매출액) as 총매출 FROM Customers C JOIN Usage U ON C.고객ID = U.고객ID GROUP BY C.지역;", token: "XN-C3-44" },
            { day: 4, title: "NULL 처리 및 매칭", tables: ["Customers", "Subscriptions"], syntax: "LEFT JOIN, IFNULL(컬럼, '대체값')", hint: "미가입자 포함은 LEFT JOIN이 필수입니다.", question: "전체 고객의 이름과 요금제ID를 매칭하되, 요금제가 없으면 '미가입'으로 표시하세요.", solution: "SELECT C.이름, IFNULL(S.요금제ID, '미가입') as 요금제정보 FROM Customers C LEFT JOIN Subscriptions S ON C.고객ID = S.고객ID;", token: "XN-D4-07" },
            { day: 5, title: "범위 필터링 (IN)", tables: ["Customers"], syntax: "WHERE 컬럼 IN (값1, 값2)", hint: "서울과 인천 지역을 동시에 필터링하세요.", question: "서울이나 인천 지역에 거주하는 고객들의 명단을 추출하세요.", solution: "SELECT * FROM Customers WHERE 지역 IN ('서울', '인천');", token: "XN-E5-11" },
            { day: 6, title: "평균값 집계", tables: ["Customers"], syntax: "AVG(컬럼), ROUND(값, 2)", hint: "나이의 평균을 소수점 둘째자리까지 반올림하세요.", question: "서울 지역 고객들의 평균 나이를 계산하세요. (소수점 둘째자리까지)", solution: "SELECT ROUND(AVG(나이), 2) as 평균나이 FROM Customers WHERE 지역 = '서울';", token: "XN-F6-22" },
            { day: 7, title: "날짜 계산 기초", tables: ["Customers"], syntax: "JULIANDAY('날짜'), CAST(수치 AS INTEGER)", hint: "가입일부터 현재(2024-04-10)까지 며칠이 지났는지 구하세요.", question: "고객별로 가입한 지 며칠이 지났는지 계산하세요. (기준: 2024-04-10)", solution: "SELECT 이름, CAST(JULIANDAY('2024-04-10') - JULIANDAY(가입일) AS INTEGER) as 경과일 FROM Customers;", token: "XN-G7-33" },
            { day: 8, title: "문자열 가공", tables: ["Customers"], syntax: "SUBSTR(컬럼, 시작, 길이), || (결합)", hint: "이름의 첫 글자와 고객ID를 결합하세요.", question: "이름의 첫 성씨와 고객ID를 결합하여 '관리명' 컬럼을 만드세요. (예: 김_C-001)", solution: "SELECT SUBSTR(이름, 1, 1) || '_' || 고객ID as 관리명 FROM Customers;", token: "XN-H8-44" },
            { day: 9, title: "데이터 그룹 분석", tables: ["Customers", "Usage"], syntax: "HAVING 집계조건", hint: "총 매출이 3,000원이 넘는 지역만 뽑으세요.", question: "지역별 총 매출액을 구하고, 그 중 매출 합계가 3,000원을 초과하는 지역만 조회하세요.", solution: "SELECT C.지역, SUM(U.매출액) as 총매출 FROM Customers C JOIN Usage U ON C.고객ID = U.고객ID GROUP BY C.지역 HAVING 총매출 > 3000;", token: "XN-I9-55" },
            { day: 10, title: "최종 실무 리포트", tables: ["Customers", "Usage"], syntax: "서브쿼리 활용: WHERE 컬럼 IN (SELECT ...)", hint: "전체 평균은 (SELECT AVG(매출액) FROM Usage)로 구합니다.", question: "서울 지역 고객 중 총 매출액이 전체 평균 매출보다 높은 고객의 이름을 출력하세요.", solution: "SELECT 이름 FROM Customers WHERE 1=1 AND 지역 = '서울' AND 고객ID IN (SELECT 고객ID FROM Usage WHERE 매출액 > (SELECT AVG(매출액) FROM Usage));", token: "XN-Z0-99" }
        ];

        function ResultTable({ data, title }) {
            if (!data) return null;
            return (
                <div className="mt-4 border rounded-xl overflow-hidden bg-white shadow-sm border-slate-200 animate-fade">
                    <div className="bg-slate-800 text-white px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest">{title}</div>
                    <div className="overflow-x-auto custom-scrollbar">
                        <table className="w-full text-[11px] text-left border-collapse">
                            <thead><tr className="bg-slate-50 border-b">{data.columns.map(c => <th key={c} className="px-3 py-2 font-bold text-slate-500 uppercase whitespace-nowrap">{c}</th>)}</tr></thead>
                            <tbody>{data.values.map((row, i) => <tr key={i} className="border-b last:border-0 hover:bg-slate-50">{row.map((val, j) => <td key={j} className="px-3 py-2 font-mono text-slate-600 whitespace-nowrap">{String(val)}</td>)}</tr>)}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [currentDay, setCurrentDay] = useState(1);
            const [userQuery, setUserQuery] = useState("");
            const [db, setDb] = useState(null);
            const [queryResult, setQueryResult] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [solvedDays, setSolvedDays] = useState([]);
            const [showHint, setShowHint] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('sql_master_v3_final_solved');
                if (saved) setSolvedDays(JSON.parse(saved));

                initSqlJs({ locateFile: f => "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.wasm" }).then(SQL => {
                    const database = new SQL.Database();
                    Object.keys(schemaData).forEach(name => {
                        const t = schemaData[name];
                        const colDefs = t.columns.map((c, i) => '"' + c + '" ' + t.types[i]).join(",");
                        database.run("CREATE TABLE " + name + " (" + colDefs + ")");
                        t.samples.forEach(row => database.run("INSERT INTO " + name + " VALUES (" + row.map(() => "?").join(",") + ")", row));
                    });
                    setDb(database);
                });
            }, []);

            const runQuery = () => {
                if (!db) return;
                setIsCorrect(null); setShowHint(false);
                try {
                    const cleanedQuery = userQuery.replace(/\u00a0/g, ' ');
                    const active = curriculum.find(c => c.day === currentDay) || curriculum[0];
                    const userRes = db.exec(cleanedQuery);
                    const answerRes = db.exec(active.solution);
                    
                    if (userRes.length > 0) {
                        setQueryResult(userRes[0]);
                        const normalize = (res) => JSON.stringify([...res[0].values].sort((a,b) => JSON.stringify(a).localeCompare(JSON.stringify(b))));
                        const match = normalize(userRes) === normalize(answerRes);
                        
                        setIsCorrect(match);
                        if (match && !solvedDays.includes(currentDay)) {
                            const next = [...solvedDays, currentDay];
                            setSolvedDays(next);
                            localStorage.setItem('sql_master_v3_final_solved', JSON.stringify(next));
                        }
                    } else { setIsCorrect(false); }
                } catch (e) { setIsCorrect(false); }
            };

            const active = curriculum.find(c => c.day === currentDay) || curriculum[0];

            return (
                <div className="min-h-screen flex flex-col p-4 md:p-10 max-w-7xl mx-auto">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 border-b pb-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-200"><CustomIcon name="database" color="white" /></div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tighter uppercase">SQL CHALLENGE DASH</h1>
                        </div>
                        <div className="flex gap-1 overflow-x-auto pb-2 max-w-full custom-scrollbar">
                            {curriculum.map(c => {
                                const isLocked = curriculum.indexOf(c) > 0 && !solvedDays.includes(curriculum[curriculum.indexOf(c)-1].day);
                                return (
                                    <button key={c.day} onClick={() => {setCurrentDay(c.day); setUserQuery(""); setQueryResult(null); setIsCorrect(null); setShowHint(false);}} disabled={isLocked} className={"px-4 py-2 rounded-xl text-xs font-black transition-all shrink-0 flex items-center gap-2 " + (currentDay === c.day ? "bg-blue-600 text-white scale-105 shadow-lg" : isLocked ? "bg-slate-200 text-slate-400 opacity-50" : "bg-white text-slate-400 border border-slate-200 hover:border-blue-400")}>
                                        {isLocked ? <CustomIcon name="lock" className="w-3 h-3" /> : solvedDays.includes(c.day) ? <CustomIcon name="check" className="w-3 h-3" color="#10b981" /> : null} Day {c.day < 10 ? '0' + c.day : c.day}
                                    </button>
                                );
                            })}
                        </div>
                    </header>

                    <main className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm text-left animate-fade h-full">
                                <h2 className="text-sm font-black text-blue-600 uppercase tracking-widest mb-2">MISSION {active.day}</h2>
                                <h3 className="text-xl font-bold text-slate-900 mb-4 tracking-tight">{active.title}</h3>
                                <div className="bg-blue-50 p-4 rounded-xl mb-6">
                                    <h4 className="text-[10px] font-black text-blue-400 uppercase mb-1">Syntax Guide</h4>
                                    <p className="text-[11px] font-mono text-blue-800 leading-relaxed">{active.syntax}</p>
                                </div>
                                <p className="text-sm text-slate-600 leading-relaxed mb-6 font-medium bg-slate-50 p-5 rounded-xl border border-slate-100 italic">"{active.question}"</p>
                                <button onClick={() => setShowHint(!showHint)} className="text-[10px] font-black text-slate-400 hover:text-blue-600 flex items-center gap-1 uppercase tracking-tighter transition-colors">
                                    <CustomIcon name="info" className="w-4 h-4" /> {showHint ? "닫기" : "힌트 보기"}
                                </button>
                                {showHint && <p className="mt-3 p-4 bg-amber-50 text-amber-700 text-[11px] rounded-xl border border-amber-100 animate-fade leading-relaxed">💡 {active.hint}</p>}
                            </section>
                        </div>

                        <div className="lg:col-span-8 space-y-6 flex flex-col">
                            {/* Data Schema Reference: Filtered by active.tables */}
                            <div className="space-y-3 text-left animate-fade">
                                <div className="flex items-center gap-2 px-1">
                                    <CustomIcon name="layout" className="w-4 h-4 text-slate-400" />
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Required Tables Reference</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {active.tables.map(name => (
                                        <div key={name} className="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm hover:border-blue-200 transition-all">
                                            <span className="text-[9px] font-black text-blue-600 uppercase tracking-widest block mb-1.5 flex items-center gap-1">
                                                <CustomIcon name="database" className="w-3 h-3" /> {name}
                                            </span>
                                            <div className="overflow-x-auto custom-scrollbar">
                                                <table className="w-full text-[8px] text-left">
                                                    <thead><tr className="border-b text-slate-400 font-bold">{schemaData[name].columns.map(c => <th key={c} className="px-1 py-1 uppercase">{c}</th>)}</tr></thead>
                                                    <tbody>{schemaData[name].samples.slice(0,3).map((row, i) => <tr key={i} className="border-b border-slate-50 last:border-0">{row.map((val, j) => <td key={j} className="px-1 py-1 font-mono text-slate-500 whitespace-nowrap">{String(val)}</td>)}</tr>)}</tbody>
                                                </table>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col border border-slate-700">
                                <div className="bg-slate-800 px-8 py-4 border-b border-slate-700 flex justify-between items-center"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">SQL Editor</span></div>
                                <textarea className="p-8 bg-slate-900 text-blue-100 font-mono text-sm focus:outline-none resize-none h-[300px] leading-relaxed sql-editor" placeholder="-- 상단의 테이블 스키마를 참고하여 쿼리를 작성하세요." value={userQuery} onChange={e => setUserQuery(e.target.value)}></textarea>
                                <div className="p-6 bg-slate-800 border-t border-slate-700 flex justify-end">
                                    <button onClick={runQuery} className="bg-blue-600 hover:bg-blue-700 text-white px-12 py-3 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all flex items-center gap-2">
                                        <CustomIcon name="play" className="w-4 h-4 fill-current" /> RUN MISSION
                                    </button>
                                </div>
                                {isCorrect !== null && (
                                    <div className={"p-8 border-t border-slate-800 " + (isCorrect ? "bg-emerald-950/20" : "bg-rose-950/20")}>
                                        <div className="flex items-center justify-between mb-4 text-sm font-black tracking-tight">
                                            {isCorrect ? <div className="text-emerald-400 flex items-center gap-2"><CustomIcon name="award" className="w-5 h-5" /> SUCCESS! 인증코드: {active.token}</div> : <div className="text-rose-400 flex items-center gap-2"><CustomIcon name="info" className="w-5 h-5" /> LOGIC ERROR: 결과가 정답과 다릅니다. 힌트를 확인하세요!</div>}
                                        </div>
                                        {queryResult && <ResultTable data={queryResult} title="Your Execution Result" />}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                    <footer className="bg-white border-t p-8 text-slate-300 text-[10px] font-black uppercase tracking-[0.4em] text-center mt-10">SQL Mastery Course v3.4 - 10 Days Full Course</footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
